    <!-- Google Fonts — connected early and loaded non-blocking. Combined
         into a single request so we don't pay two RTTs to fonts.googleapis
         for what used to be a Doto-only call plus the main Jaro / Instrument
         Sans / Doto call. preload+onload swap lets the rest of the head
         continue parsing without waiting on the CSS file. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Jaro:opsz@6..72&family=Doto:wght@400;700;900&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Jaro:opsz@6..72&family=Doto:wght@400;700;900&display=swap"
